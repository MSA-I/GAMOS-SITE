<script>
// ────────────────────────────────────────────────────────────────────────────
// GAMOS logo → exploding particles. Pure canvas 2D, zero deps.
// Same MECHANIC as phantom-rebuild's dude (a Points cloud that swings then whips
// apart + fades), but the point source is the GAMOS letter-logo, sampled from
// the hero SVG instead of a banned .glb model.
//   form (assemble) → idle (sway) → explode (fly out + fade) → loop.
// ────────────────────────────────────────────────────────────────────────────
const DOT = "#ffffff", INK = "#1A1410";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

let W = 0, H = 0, dpr = 1;
let particles = [];          // {sx,sy home in sample-space; x,y screen; vx,vy; fx,fy form-start}
let sampleW = 1, sampleH = 1; // logo raster size the homes are measured in
let layout = { scale: 1, ox: 0, oy: 0, cx: 0, cy: 0 };

// timeline (seconds). reduced-motion → hold the assembled logo, no loop.
const FORM = 1.2, IDLE = 1.6, EXPLODE = 1.6;
let phase = "form", t = 0, last = 0;

const easeOut = (x) => 1 - Math.pow(1 - x, 3);   // power3.out
const easeIn  = (x) => x * x * x;                // power3.in
const rand = (a, b) => a + Math.random() * (b - a);

function resize() {
  dpr = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeLayout();
}

// map the logo raster (sampleW×sampleH) to a centered box on screen
function computeLayout() {
  const dispW = Math.min(W * 0.82, 1100);
  const scale = dispW / sampleW;
  const dispH = sampleH * scale;
  layout.scale = scale;
  layout.ox = (W - dispW) / 2;
  layout.oy = (H - dispH) / 2;
  layout.cx = W / 2;
  layout.cy = layout.oy + dispH / 2;
}
const homeX = (p) => layout.ox + p.sx * layout.scale;
const homeY = (p) => layout.oy + p.sy * layout.scale;

// draw the SVG offscreen, sample opaque pixels on a grid → particle homes
function buildParticles(img) {
  const aspect = img.naturalWidth / img.naturalHeight || (205.7 / 82.46);
  sampleW = 760; sampleH = Math.round(sampleW / aspect);
  const off = document.createElement("canvas");
  off.width = sampleW; off.height = sampleH;
  const o = off.getContext("2d");
  o.drawImage(img, 0, 0, sampleW, sampleH);
  const data = o.getImageData(0, 0, sampleW, sampleH).data;

  // pick a step that yields ~5000 points regardless of coverage
  let step = 3;
  const count = () => {
    let n = 0;
    for (let y = 0; y < sampleH; y += step)
      for (let x = 0; x < sampleW; x += step)
        if (data[(y * sampleW + x) * 4 + 3] > 128) n++;
    return n;
  };
  while (count() > 6000 && step < 8) step++;

  particles = [];
  for (let y = 0; y < sampleH; y += step) {
    for (let x = 0; x < sampleW; x += step) {
      if (data[(y * sampleW + x) * 4 + 3] > 128) {
        particles.push({
          sx: x, sy: y,
          x: 0, y: 0, vx: 0, vy: 0, fx: 0, fy: 0,
          ph: Math.random() * Math.PI * 2,      // sway phase
          sp: rand(0.9, 1.6),                    // explode speed factor
        });
      }
    }
  }
  resize(); // sets dpr / canvas size / W / H and lays out the logo box

  // start already scattered so the first thing you see is the assemble
  for (const p of particles) {
    p.x = p.fx = rand(0, W); p.y = p.fy = rand(0, H);
  }

  if (reduced) { drawStatic(); return; }
  last = performance.now();
  requestAnimationFrame(tick);
}

function drawStatic() {
  ctx.fillStyle = INK; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = DOT;
  for (const p of particles) ctx.fillRect(homeX(p) - 1, homeY(p) - 1, 2.2, 2.2);
}

function startExplode() {
  phase = "explode"; t = 0;
  for (const p of particles) {
    const hx = homeX(p), hy = homeY(p);
    let dx = hx - layout.cx, dy = hy - layout.cy;
    const d = Math.hypot(dx, dy) || 1;
    dx /= d; dy /= d;
    const speed = rand(280, 620) * p.sp;
    p.x = hx; p.y = hy;
    p.vx = dx * speed + rand(-90, 90);
    p.vy = dy * speed + rand(-90, 90) - 120;   // slight upward bias
  }
}

function tick(now) {
  const dt = Math.min((now - last) / 1000, 0.05); last = now;
  t += dt;

  if (phase === "form" && t >= FORM) {
    phase = "idle"; t = 0;
  } else if (phase === "idle" && t >= IDLE) {
    startExplode();
  } else if (phase === "explode" && t >= EXPLODE) {
    phase = "form"; t = 0;
    for (const p of particles) { p.fx = p.x; p.fy = p.y; } // reassemble from where they flew
  }

  ctx.fillStyle = INK; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = DOT;

  if (phase === "form") {
    const e = easeOut(t / FORM);
    const a = Math.min(t / (FORM * 0.5), 1);
    ctx.globalAlpha = a;
    for (const p of particles) {
      p.x = p.fx + (homeX(p) - p.fx) * e;
      p.y = p.fy + (homeY(p) - p.fy) * e;
      ctx.fillRect(p.x - 1, p.y - 1, 2.2, 2.2);
    }
  } else if (phase === "idle") {
    ctx.globalAlpha = 1;
    for (const p of particles) {
      const s = Math.sin(now * 0.001 + p.ph);
      p.x = homeX(p) + s * 1.1;
      p.y = homeY(p) + Math.cos(now * 0.0012 + p.ph) * 1.1;
      ctx.fillRect(p.x - 1, p.y - 1, 2.2, 2.2);
    }
  } else { // explode
    const fade = 1 - easeIn(t / EXPLODE);
    ctx.globalAlpha = fade;
    const drag = Math.max(0, 1 - 1.6 * dt);
    for (const p of particles) {
      p.vx *= drag; p.vy = p.vy * drag + 260 * dt; // drag + gravity
      p.x += p.vx * dt; p.y += p.vy * dt;
      ctx.fillRect(p.x - 1, p.y - 1, 2.4, 2.4);
    }
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(tick);
}

// click anywhere → explode now (unless already mid-explode)
addEventListener("pointerdown", () => {
  if (!reduced && phase !== "explode") startExplode();
});
addEventListener("resize", () => { resize(); if (reduced) drawStatic(); });

// load the inlined logo SVG (blob URL = same-origin, canvas stays readable)
const svg = document.getElementById("logoSrc").textContent;
const img = new Image();
img.onload = () => buildParticles(img);
img.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
</script>
