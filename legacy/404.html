<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1A1410">
  <meta name="color-scheme" content="light">

  <!-- SEO: error pages must never be indexed -->
  <title>404 — הדף לא נמצא | גאמוס אירועים</title>
  <meta name="description" content="הדף שחיפשתם לא נמצא. חזרה לעמוד הראשי של גאמוס אירועים.">
  <meta name="robots" content="noindex, follow">

  <!-- Favicon -->
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="manifest" href="/assets/site.webmanifest">

  <!-- Preload the full-bleed desert hero (LCP candidate) + critical fonts -->
  <link rel="preload" as="image" type="image/webp" fetchpriority="high"
        href="/assets/images/404/desert.full.webp">
  <link rel="preload" as="font" type="font/woff2" crossorigin
        href="/assets/fonts/rubik-hebrew.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin
        href="/assets/fonts/heebo-400.woff2">

  <!-- Stylesheets: foundation -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/utilities.css">

  <!-- Stylesheets: chrome (texture-text brand typography + canonical buttons) -->
  <link rel="stylesheet" href="/css/components/texture-text.css">
  <link rel="stylesheet" href="/css/components/buttons.css">

  <!-- Stylesheets: page-scoped -->
  <link rel="stylesheet" href="/css/pages/404.css">
</head>
<body class="error-404-page">

  <!-- A11y: skip-link must be first focusable -->
  <a class="skip-link" href="#error-404-home">דלג לקישור החזרה</a>

  <main class="error-404" role="main">
    <!-- Screen-reader context: the visual "404" eyebrow is decorative editorial.
         No static English line — page is Hebrew; browser/Google translate turns
         this Hebrew into English on demand. -->
    <h1 class="sr-only">404 — הדף לא נמצא</h1>

    <!-- Full-bleed golden-desert hero: footprints dissolving into the dunes. -->
    <picture class="error-404__picture">
      <source media="(max-width: 768px)"
              srcset="/assets/images/404/desert.half.webp" type="image/webp">
      <source srcset="/assets/images/404/desert.full.webp" type="image/webp">
      <img src="/assets/images/404/desert.full.jpg"
           alt="שביל עקבות נמוג אל תוך דיונות מדבר יהודה באור זהוב של שקיעה"
           width="1920" height="1086"
           decoding="async" loading="eager" fetchpriority="high">
    </picture>

    <!-- Directional scrim (protects the reading-start edge, fades over the photo). -->
    <div class="error-404__overlay" aria-hidden="true"></div>

    <!-- Floating home link, top reading-start corner. -->
    <a class="error-404__home-float btn btn--glass" href="/"
       aria-label="מעבר לעמוד הבית של גאמוס">לעמוד הבית</a>

    <div class="error-404__content">
      <p class="error-404__eyebrow">404</p>

      <p class="error-404__title texture-text texture-text--light">אופס, איבדתם את הדרך.</p>

      <p class="error-404__cta">
        <a id="error-404-home" class="btn btn--glass" href="/">
          חזרה לעמוד הראשי
          <span class="btn__arrow" aria-hidden="true">→</span>
        </a>
      </p>
    </div>
  </main>

</body>
</html>
