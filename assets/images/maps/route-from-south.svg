<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="map-south-title">
  <title id="map-south-title">מסלול הגעה לגאמוס מדרום</title>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE6"/>
      <stop offset="100%" stop-color="#E8DFD3"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B8576F"/>
      <stop offset="50%" stop-color="#CFAE83"/>
      <stop offset="100%" stop-color="#8B6F46"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CFAE83" stroke-width="0.5" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#paper)"/>
  <rect width="800" height="1000" fill="url(#grid)"/>

  <!-- Decorative highway shapes -->
  <path d="M 100 980 C 200 850, 280 700, 350 600 S 480 380, 520 250 L 540 80"
        stroke="#8B6F46" stroke-width="3" fill="none" opacity="0.45" stroke-dasharray="8 6"/>
  <path d="M 200 980 C 260 870, 320 760, 360 660 S 440 460, 460 320 L 480 100"
        stroke="#8B6F46" stroke-width="2" fill="none" opacity="0.30" stroke-dasharray="6 8"/>

  <!-- Active route — south to north -->
  <path d="M 280 920 C 340 800, 380 690, 410 580 S 460 360, 470 220 L 480 130"
        stroke="url(#route)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Origin pin (south) -->
  <g transform="translate(280 920)">
    <circle r="22" fill="#534133" opacity="0.15"/>
    <circle r="13" fill="#534133"/>
    <circle r="6" fill="#F5EFE6"/>
    <text y="-32" text-anchor="middle" font-family="'Frank Ruhl Libre', serif" font-size="22" font-weight="700" fill="#1A1410">דרום</text>
    <text y="48" text-anchor="middle" font-family="'Heebo', sans-serif" font-size="14" fill="#534133">באר שבע · ערד · דימונה</text>
  </g>

  <!-- Destination pin (Gamos) -->
  <g transform="translate(480 130)">
    <circle r="28" fill="#CFAE83" opacity="0.22"/>
    <circle r="20" fill="#CFAE83"/>
    <circle r="9" fill="#1A1410"/>
    <text y="-40" text-anchor="middle" font-family="'Frank Ruhl Libre', serif" font-size="26" font-weight="700" fill="#1A1410">גאמוס</text>
    <text y="56" text-anchor="middle" font-family="'Heebo', sans-serif" font-size="14" fill="#534133">די זהב 7, מעלה אדומים</text>
  </g>

  <!-- Compass rose -->
  <g transform="translate(700 880)" opacity="0.6">
    <circle r="36" fill="none" stroke="#534133" stroke-width="1.2"/>
    <polygon points="0,-30 6,0 0,30 -6,0" fill="#CFAE83"/>
    <text y="-44" text-anchor="middle" font-family="'Heebo', sans-serif" font-size="12" fill="#534133">צפון</text>
  </g>

  <!-- Heading label -->
  <text x="400" y="50" text-anchor="middle" font-family="'Frank Ruhl Libre', serif" font-size="32" font-weight="700" fill="#1A1410">מסלול הגעה — מדרום</text>
</svg>
